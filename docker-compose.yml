version: "3.8"

services:
  # 1. DATABASE NGUỒN: MySQL (Raw Layer)
  mysql_source:
    image: mysql:8.0
    container_name: mysql_raw_container
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: weather_raw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. DATA WAREHOUSE: PostgreSQL (Staging & Mart Layers)
  postgres_dw:
    image: postgres:15
    container_name: postgres_dw_container
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: weather_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. CHỈ HUY TRƯỞNG: Apache Airflow (Dùng bản chạy gọn nhẹ LocalExecutor)
  airflow:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_container
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@airflow_db:5432/airflow_meta
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=pymysql
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./assets:/opt/airflow/assets
    ports:
      - "8080:8080"
    depends_on:
      - airflow_db
    command: bash -c "airflow db init && airflow users create --username admin --firstname Admin --lastname Admin --role Admin --email admin@example.com --password admin && airflow webserver & airflow scheduler"

  # Database phụ vụ riêng cho bản thân Airflow lưu trạng thái (Không liên quan đến data weather)
  airflow_db:
    image: postgres:15
    container_name: airflow_db_container
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_meta

volumes:
  mysql_data:
  postgres_data:
